<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘 뭐 먹지?</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=9" />
  </head>
  <body>
    <div class="ambiance" aria-hidden="true"></div>

    <div class="modal" id="locationModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-card">
        <p class="modal-eyebrow">TODAY'S PICK</p>
        <h2 id="modalTitle">어디서 먹을까요?</h2>
        <p class="modal-desc">위치를 정하면 근처 식당으로 룰렛을 만들어요. 점심·저녁 언제든 돌려 보세요.</p>

        <label class="field-label" for="locationInput">위치 / 장소 이름</label>
        <input
          id="locationInput"
          class="field-input"
          type="text"
          placeholder="예: 네이버 1784, 강남역, 판교역"
          autocomplete="off"
        />

        <p class="modal-error" id="modalError" hidden></p>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="geoBtn">현재 위치 사용</button>
          <button type="button" class="btn-primary" id="startBtn">이 위치로 시작</button>
        </div>
      </div>
    </div>

    <main class="app is-locked" id="app">
      <header class="header">
        <p class="eyebrow" id="locationLabel">위치를 선택해 주세요</p>
        <h1>오늘 뭐 먹지?</h1>
        <p class="subtitle">고민은 짧게, 선택은 룰렛으로</p>
        <button type="button" class="change-location" id="changeLocationBtn">위치 변경</button>
      </header>

      <section class="roulette-wrap" aria-label="오늘 뭐 먹지 룰렛">
        <div class="wheel-glow" aria-hidden="true"></div>
        <div class="wheel-ring" aria-hidden="true"></div>
        <div class="pointer" aria-hidden="true">
          <span class="pointer-tip"></span>
        </div>
        <div class="wheel" id="wheel"></div>
        <div class="hub" aria-hidden="true"><span>GO</span></div>
      </section>

      <section class="panel" aria-label="추첨 조작">
        <div class="result-card" id="resultCard">
          <div class="result-card-top">
            <span class="status-chip" id="statusChip">대기 중</span>
            <span class="result-meta" id="resultMeta">근처 15곳</span>
          </div>
          <p class="result-kicker">오늘의 선택</p>
          <p class="result-name" id="resultName">위치를 먼저 정해 주세요</p>
          <p class="result-hint" id="resultHint">시작 팝업에서 위치를 입력하면 룰렛이 만들어져요</p>
        </div>

        <button type="button" class="spin-btn" id="spinBtn" disabled>
          <span class="spin-btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path
                d="M20 12a8 8 0 1 1-2.2-5.5"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
              />
              <path
                d="M20 5v5h-5"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="spin-btn-text">
            <span class="spin-btn-label" id="spinBtnLabel">돌리기</span>
            <span class="spin-btn-sub" id="spinBtnSub">위치 설정 후 사용</span>
          </span>
        </button>
      </section>
    </main>

    <script src="script.js?v=9"></script>
  </body>
</html>
